services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tasktracker
      POSTGRES_PASSWORD: tasktracker
      POSTGRES_DB: tasktracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasktracker -d tasktracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: runs `prisma migrate deploy` then exits. App waits for success.
  migrate:
    build:
      context: ./app
      dockerfile: Dockerfile
      target: migrator
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://tasktracker:tasktracker@postgres:5432/tasktracker?schema=public

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://tasktracker:tasktracker@postgres:5432/tasktracker?schema=public
      # Unset by default so NextAuth derives the base URL from the request host
      # (AUTH_TRUST_HOST=true). Set AUTH_URL explicitly only behind a proxy that
      # rewrites the host. Hardcoding localhost here sent logout to localhost on
      # remote servers.
      AUTH_URL: ${AUTH_URL:-}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
    ports:
      - "3000:3000"

volumes:
  pgdata:
